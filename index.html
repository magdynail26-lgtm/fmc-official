<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST MINI CASH - FINAL V62</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Readex+Pro:wght@400;700&display=swap');
        :root { --bg: #050010; --purple: #bc13fe; --cyan: #00f2ff; --gold: #ffd700; --fire: #ff4d00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Readex Pro', sans-serif; height: 100vh; overflow: hidden; width: 100%; text-align: center; }
        #onboarding { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a0033, #050010); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .gender-box { display: flex; gap: 20px; margin: 15px 0; }
        .gender-opt { width: 90px; height: 90px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; overflow: hidden; }
        .gender-opt.selected { border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan); transform: scale(1.1); }
        .gender-opt img { width: 100%; height: 100%; object-fit: cover; }
        .main-input { width: 100%; max-width: 300px; padding: 15px; background: #000; border: 2px solid var(--purple); border-radius: 12px; color: #fff; text-align: center; margin-bottom: 15px; font-family: inherit; font-size: 16px; }
        .btn-main { background: var(--purple); color: #fff; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; max-width: 250px; font-size: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .app-shell { width: 100%; height: 100vh; display: none; flex-direction: column; padding: 15px; justify-content: space-between; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid var(--purple); }
        .header-av { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--cyan); }
        .bal-val { font-family: 'Orbitron'; font-size: 65px; font-weight: 900; text-shadow: 0 0 30px var(--purple); margin: 0; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 5px; }
        .menu-item { border-radius: 22px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid rgba(188,19,254,0.3); background: rgba(255,255,255,0.02); }
        .overlay { position: fixed; inset: 0; background: rgba(5,0,16,0.99); z-index: 2000; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
        .active { display: flex; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--purple); margin-bottom: 12px; text-align: right; }
    </style>
</head>
<body>
<div id="onboarding">
    <h1 style="font-family:Orbitron; color:var(--cyan);">FAST MINI CASH</h1>
    <div class="gender-box">
        <div class="gender-opt selected" id="opt-boy" onclick="setG('boy')"><img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"></div>
        <div class="gender-opt" id="opt-girl" onclick="setG('girl')"><img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png"></div>
    </div>
    <input type="text" id="uNameIn" class="main-input" placeholder="اسمك المستعار">
    <button class="btn-main" onclick="register()">دخول 🚀</button>
</div>
<div class="app-shell" id="mainApp">
    <div class="top-nav">
        <div style="display:flex; align-items:center; gap:10px;"><img id="hAv" class="header-av" src=""><b id="hName">...</b></div>
        <i class="fas fa-gift" style="color:var(--gold); font-size:20px;" onclick="claimDaily()"></i>
    </div>
    <div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center;">
        <h1 class="bal-val" id="bDisp">0</h1>
        <span style="color:var(--cyan); letter-spacing:3px; font-size:12px;">FMC BALANCE</span>
    </div>
    <div class="grid-menu">
        <div class="menu-item" onclick="toggle('tasksO')"><i class="fas fa-bolt" style="color:var(--fire)"></i><span>المهام</span></div>
        <div class="menu-item" onclick="toggle('puzzleO')"><i class="fas fa-brain" style="color:var(--gold)"></i><span>اللغز</span></div>
        <div class="menu-item" onclick="toggle('friendsO')"><i class="fas fa-users" style="color:var(--purple)"></i><span>أصدقائي</span></div>
        <div class="menu-item" onclick="toggle('walletO')"><i class="fas fa-wallet" style="color:var(--cyan)"></i><span>السحب</span></div>
    </div>
</div>
<div id="friendsO" class="overlay">
    <div onclick="toggle('friendsO')" style="color:var(--cyan); margin-bottom:15px;">✕ رجوع</div>
    <div class="card"><h4>رابط الإحالة</h4><input id="refL" class="main-input" readonly><button class="btn-main" style="max-width:100%" onclick="copy()">نسخ الرابط</button></div>
    <div class="card"><h4>الأصدقاء (<span id="refC">0</span>)</h4><div id="refList"></div></div>
</div>
<div id="walletO" class="overlay">
    <div onclick="toggle('walletO')">✕ رجوع</div>
    <div class="card">
        <h3>رصيدك: <span id="uVal">0</span>$</h3>
        <p style="font-size:11px; color:var(--gold)">حد السحب: 5000 FMC (5$)</p>
        <select class="main-input"><option>Vodafone Cash</option><option>TON Wallet</option><option>Binance Pay</option></select>
        <button class="btn-main" style="max-width:100%" onclick="withdraw()">طلب سحب</button>
    </div>
</div>
<div id="tasksO" class="overlay"><div onclick="toggle('tasksO')">✕ رجوع</div><div id="tList"></div></div>
<div id="puzzleO" class="overlay"><div onclick="toggle('puzzleO')">✕ رجوع</div><div class="card"><h2>قريباً..</h2><p>انتظروا أقوى العروض والمسابقات</p></div></div>
<script>
    const config = {
        apiKey: "AIzaSyAs-u_A0vW3kRzB_7Xn_Z6z5y0e9X8w7vQ",
        authDomain: "fast-mini-cash.firebaseapp.com",
        projectId: "fast-mini-cash",
        databaseURL: "https://fast-mini-cash-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let uID = localStorage.getItem('fmc_uid') || "";
    let gnd = "boy";
    window.onload = () => { if(uID) load(); buildTasks(); };
    function setG(g) { gnd = g; document.querySelectorAll('.gender-opt').forEach(e => e.classList.remove('selected')); document.getElementById('opt-'+g).classList.add('selected'); }
    function register() {
        const name = document.getElementById('uNameIn').value.trim();
        if(!name) return alert("اكتب اسمك");
        uID = "U" + Date.now();
        const av = gnd === 'boy' ? "https://cdn-icons-png.flaticon.com/512/4140/4140048.png" : "https://cdn-icons-png.flaticon.com/512/4140/4140047.png";
        const refBy = new URLSearchParams(window.location.search).get('ref');
        db.ref('users/' + uID).set({name: name, avatar: av, balance: 50, lastGift: 0, milestones: {m3:false, m5:false, m10:false, m15:false, m25:false, m50:false}}).then(() => {
            if(refBy && refBy !== uID) { db.ref('referrals/' + refBy + '/' + uID).set({name: name}); checkRefs(refBy); }
            localStorage.setItem('fmc_uid', uID); load();
        }).catch(e => alert("خطأ في الاتصال: " + e.message));
    }
    function load() {
        db.ref('users/' + uID).on('value', s => {
            const d = s.val();
            if(d) {
                document.getElementById('hName').innerText = d.name; document.getElementById('hAv').src = d.avatar;
                document.getElementById('bDisp').innerText = d.balance; document.getElementById('uVal').innerText = (d.balance/1000).toFixed(2);
                document.getElementById('onboarding').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex';
                document.getElementById('refL').value = window.location.origin + window.location.pathname + "?ref=" + uID;
            }
        });
        db.ref('referrals/' + uID).on('value', s => {
            const list = document.getElementById('refList'); list.innerHTML = ""; let c = 0;
            s.forEach(x => { c++; list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">${x.val().name} ✅</div>`; });
            document.getElementById('refC').innerText = c;
        });
    }
    function checkRefs(r) {
        db.ref('referrals/' + r).once('value', s => {
            let c = s.numChildren();
            db.ref('users/' + r).once('value', us => {
                let d = us.val(); let b = 0; let m = d.milestones || {};
                const gs = [3, 5, 10, 15, 25, 50]; const rs = [200, 300, 500, 800, 1200, 2000];
                gs.forEach((g, i) => { if(c >= g && !m['m'+g]) { b += rs[i]; m['m'+g] = true; } });
                if(b > 0) db.ref('users/' + r).update({balance: d.balance + b, milestones: m});
            });
        });
    }
    function buildTasks() {
        const l = document.getElementById('tList');
        for(let i=1; i<=50; i++) { l.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;"><span>مهمة ${i}</span><button onclick="doT()" class="btn-main" style="width:70px; padding:5px;">+10</button></div>`; }
    }
    function doT() { window.open('https://google.com'); db.ref('users/' + uID).once('value', s => db.ref('users/' + uID).update({balance: s.val().balance + 10})); }
    function claimDaily() {
        db.ref('users/' + uID).once('value', s => {
            const d = s.val(); const now = Date.now();
            if(now - (d.lastGift || 0) > 86400000) { db.ref('users/' + uID).update({balance: d.balance + 50, lastGift: now}); alert("تم استلام 50 FMC هدية! 🎁"); } else alert("الهدية القادمة بعد 24 ساعة!");
        });
    }
    function withdraw() { db.ref('users/' + uID).once('value', s => { if(s.val().balance < 5000) alert("حد السحب الأدنى 5000 FMC"); else alert("تم إرسال الطلب بنجاح!"); }); }
    function copy() { let x = document.getElementById("refL"); x.select(); document.execCommand("copy"); alert("تم النسخ!"); }
    function toggle(id) { document.getElementById(id).classList.toggle('active'); }
</script>
</body>
</html>
